<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #fafafa;
            color: #333;
            line-height: 1.8;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2em;
            border-bottom: 3px solid #3498db;
            padding-bottom: 15px;
        }

        h2 {
            color: #2c3e50;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 4px solid #3498db;
        }

        .summary {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .main-points {
            background-color: #e8f6f3;
            padding: 20px 20px 20px 40px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .main-points li {
            margin-bottom: 10px;
        }

        .vocabulary-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .vocab-item {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .vocab-item .word {
            font-size: 1.3em;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 5px;
        }

        .vocab-item .pos {
            font-size: 0.85em;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 10px;
        }

        .vocab-item .definition {
            margin-bottom: 10px;
            color: #333;
        }

        .vocab-item .example {
            font-size: 0.9em;
            color: #555;
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #3498db;
        }

        .article-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 30px;
            line-height: 2;
        }

        .article-content p {
            margin-bottom: 1em;
            text-align: justify;
        }

        .article-content p:last-child {
            margin-bottom: 0;
        }

        .discussion-section ol {
            padding-left: 25px;
        }

        .discussion-section li {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #fdf2e9;
            border-radius: 4px;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85em;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        @media print {
            body {
                padding: 0;
            }

            .container {
                box-shadow: none;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{TITLE}}</h1>

        <section>
            <h2>Summary</h2>
            <div class="summary">
                {{SUMMARY}}
            </div>
        </section>

        <section>
            <h2>Main Points</h2>
            <ul class="main-points">
                {{MAIN_POINTS}}
            </ul>
        </section>

        <section>
            <h2>Vocabulary</h2>
            <div class="vocabulary-section">
                {{VOCABULARY}}
            </div>
        </section>

        <section>
            <h2>Article</h2>
            <div class="article-content">
                {{ARTICLE}}
            </div>
        </section>

        <section class="discussion-section">
            <h2>Discussion Questions</h2>
            <ol>
                {{DISCUSSION_QUESTIONS}}
            </ol>
        </section>

        <div class="footer">
            <p>Generated by English Learning Content Generator</p>
        </div>
    </div>
</body>
</html>
