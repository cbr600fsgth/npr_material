<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Content Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>English Learning Content Generator</h1>

        <div class="input-section">
            <label for="article-title">Title (optional):</label>
            <input type="text" id="article-title" placeholder="Enter article title (auto-generated if empty)">
        </div>

        <div class="input-section">
            <label for="article-url">URL (optional):</label>
            <input type="text" id="article-url" placeholder="Enter source URL">
        </div>

        <div class="input-section">
            <label for="article-content">Article (required):</label>
            <textarea id="article-content" placeholder="Enter the English article text here..."></textarea>
        </div>

        <div class="button-section">
            <button id="generate-btn" onclick="generateContent()">Generate Content</button>
        </div>

        <div class="result-section">
            <div id="status" class="status"></div>
            <div id="result" class="result"></div>
        </div>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
